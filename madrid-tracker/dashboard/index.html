<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Madrid Property Tracker</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Leaflet (map) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Chart.js (price history sparklines) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

  <style>
    /* ── Custom styles ─────────────────────────── */
    :root {
      --accent: #2563eb;
      --accent-light: #dbeafe;
      --success: #16a34a;
      --warning: #d97706;
      --danger: #dc2626;
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f1f5f9; }
    #map { height: 400px; border-radius: 0.75rem; }

    .card {
      background: white;
      border-radius: 0.75rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      transition: box-shadow .2s;
    }
    .card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.12); }

    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 8px; border-radius: 999px;
      font-size: .72rem; font-weight: 600;
    }
    .badge-new     { background: #dcfce7; color: #15803d; }
    .badge-drop    { background: #fee2e2; color: #b91c1c; }
    .badge-saved   { background: #eff6ff; color: #1d4ed8; }
    .badge-viewed  { background: #f3f4f6; color: #6b7280; }

    .pill-btn {
      padding: 4px 14px; border-radius: 999px; font-size: .8rem;
      font-weight: 600; cursor: pointer; border: 2px solid transparent;
      transition: all .15s;
    }
    .pill-btn.active   { background: var(--accent); color: white; border-color: var(--accent); }
    .pill-btn.inactive { background: white; color: #374151; border-color: #d1d5db; }
    .pill-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

    .property-img {
      width: 100%; height: 180px; object-fit: cover;
      border-radius: 0.5rem 0.5rem 0 0;
      background: #e2e8f0;
    }

    /* Drawer overlay */
    #drawer-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.4);
      z-index: 1000; display: none;
    }
    #drawer {
      position: fixed; top: 0; right: -500px;
      width: min(500px, 95vw); height: 100%;
      background: white; z-index: 1001;
      overflow-y: auto;
      transition: right .3s ease;
      box-shadow: -4px 0 20px rgba(0,0,0,.15);
    }
    #drawer.open { right: 0; }

    /* Spinner */
    .spinner {
      border: 3px solid #e5e7eb;
      border-top-color: var(--accent);
      border-radius: 50%; width: 28px; height: 28px;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1e293b; color: white; padding: 10px 20px;
      border-radius: 8px; font-size: .85rem; z-index: 2000;
      opacity: 0; transition: opacity .3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }

    .price-drop-tag { color: var(--danger); font-weight: 700; }
    .no-results { text-align: center; padding: 60px 20px; color: #9ca3af; }

    /* Pagination */
    .page-btn {
      padding: 6px 12px; border-radius: 6px; border: 1px solid #d1d5db;
      font-size: .82rem; cursor: pointer; background: white;
    }
    .page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .page-btn:disabled { opacity: .4; cursor: default; }
    .page-btn.current { background: var(--accent); color: white; border-color: var(--accent); }
  </style>
</head>

<body class="min-h-screen">

<!-- ── Header ──────────────────────────────────────────────────────────── -->
<header class="bg-white shadow-sm sticky top-0 z-50">
  <div class="max-w-screen-xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
    <div class="flex items-center gap-3">
      <span class="text-2xl">🏠</span>
      <div>
        <h1 class="font-bold text-gray-900 text-lg leading-tight">Madrid Property Tracker</h1>
        <p id="last-scan-label" class="text-xs text-gray-400">Loading...</p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <button onclick="triggerScan()" class="pill-btn inactive text-sm">
        ↺ Scan now
      </button>
      <button onclick="toggleView('map')" id="btn-map" class="pill-btn inactive">Map</button>
      <button onclick="toggleView('list')" id="btn-list" class="pill-btn active">List</button>
    </div>
  </div>
</header>

<!-- ── KPI Bar ──────────────────────────────────────────────────────────── -->
<div class="max-w-screen-xl mx-auto px-4 mt-4">
  <div class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-6 gap-3">
    <div class="card p-4 text-center">
      <div id="kpi-total" class="text-2xl font-bold text-blue-600">—</div>
      <div class="text-xs text-gray-500 mt-1">Active listings</div>
    </div>
    <div class="card p-4 text-center">
      <div id="kpi-new" class="text-2xl font-bold text-green-600">—</div>
      <div class="text-xs text-gray-500 mt-1">New (48h)</div>
    </div>
    <div class="card p-4 text-center">
      <div id="kpi-unviewed" class="text-2xl font-bold text-orange-500">—</div>
      <div class="text-xs text-gray-500 mt-1">Not viewed</div>
    </div>
    <div class="card p-4 text-center">
      <div id="kpi-saved" class="text-2xl font-bold text-indigo-600">—</div>
      <div class="text-xs text-gray-500 mt-1">Saved</div>
    </div>
    <div class="card p-4 text-center">
      <div id="kpi-drops" class="text-2xl font-bold text-red-600">—</div>
      <div class="text-xs text-gray-500 mt-1">Price drops</div>
    </div>
    <div class="card p-4 text-center">
      <div id="kpi-avg-sqm" class="text-2xl font-bold text-purple-600">—</div>
      <div class="text-xs text-gray-500 mt-1">Avg €/m²</div>
    </div>
  </div>
</div>

<!-- ── Filters ──────────────────────────────────────────────────────────── -->
<div class="max-w-screen-xl mx-auto px-4 mt-4">
  <div class="card p-4">
    <div class="flex flex-wrap gap-3 items-end">

      <!-- Tab filters -->
      <div class="flex gap-2 flex-wrap">
        <button onclick="setTab('all')"    id="tab-all"    class="pill-btn active">All</button>
        <button onclick="setTab('new')"    id="tab-new"    class="pill-btn inactive">New 48h</button>
        <button onclick="setTab('saved')"  id="tab-saved"  class="pill-btn inactive">Saved</button>
        <button onclick="setTab('drop')"   id="tab-drop"   class="pill-btn inactive">Price drop</button>
        <button onclick="setTab('unseen')" id="tab-unseen" class="pill-btn inactive">Unseen</button>
      </div>

      <div class="flex-1"></div>

      <!-- District -->
      <div>
        <label class="text-xs font-semibold text-gray-500 block mb-1">District</label>
        <select id="f-district" onchange="loadProperties(1)"
          class="border rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="">All districts</option>
        </select>
      </div>

      <!-- Price range -->
      <div>
        <label class="text-xs font-semibold text-gray-500 block mb-1">Price €</label>
        <div class="flex gap-1">
          <input id="f-min-price" type="number" placeholder="Min"
            class="border rounded-lg px-2 py-1.5 text-sm w-24 focus:outline-none focus:ring-2 focus:ring-blue-400"
            onchange="loadProperties(1)" />
          <input id="f-max-price" type="number" placeholder="Max"
            class="border rounded-lg px-2 py-1.5 text-sm w-24 focus:outline-none focus:ring-2 focus:ring-blue-400"
            onchange="loadProperties(1)" />
        </div>
      </div>

      <!-- Rooms -->
      <div>
        <label class="text-xs font-semibold text-gray-500 block mb-1">Rooms</label>
        <select id="f-rooms" onchange="loadProperties(1)"
          class="border rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="">Any</option>
          <option value="1">1+</option>
          <option value="2">2+</option>
          <option value="3">3+</option>
          <option value="4">4+</option>
        </select>
      </div>

      <!-- Sort -->
      <div>
        <label class="text-xs font-semibold text-gray-500 block mb-1">Sort by</label>
        <select id="f-sort" onchange="loadProperties(1)"
          class="border rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="first_seen_at">Newest first</option>
          <option value="price">Price ↑</option>
          <option value="price_per_sqm">€/m² ↑</option>
          <option value="size">Size ↓</option>
        </select>
      </div>

      <button onclick="resetFilters()" class="text-xs text-gray-400 hover:text-red-500 underline">Reset</button>
    </div>
  </div>
</div>

<!-- ── Content ──────────────────────────────────────────────────────────── -->
<div class="max-w-screen-xl mx-auto px-4 mt-4 pb-12">

  <!-- Loading spinner -->
  <div id="loading" class="flex justify-center items-center py-20 hidden">
    <div class="spinner"></div>
  </div>

  <!-- Map view -->
  <div id="view-map" class="hidden mb-4">
    <div class="card p-2">
      <div id="map"></div>
    </div>
  </div>

  <!-- List view -->
  <div id="view-list">
    <div id="property-grid"
      class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
    </div>
    <div id="no-results" class="no-results hidden">
      <div class="text-5xl mb-4">🔍</div>
      <div class="text-lg font-semibold text-gray-500">No properties match your filters</div>
    </div>
  </div>

  <!-- Pagination -->
  <div id="pagination" class="flex justify-center items-center gap-2 mt-6"></div>
</div>

<!-- ── Property Drawer ──────────────────────────────────────────────────── -->
<div id="drawer-overlay" onclick="closeDrawer()"></div>
<div id="drawer">
  <div class="p-5">
    <div class="flex items-start justify-between mb-4">
      <div id="drawer-title" class="text-xl font-bold text-gray-900 pr-4"></div>
      <button onclick="closeDrawer()"
        class="text-gray-400 hover:text-gray-700 text-2xl leading-none mt-0.5">✕</button>
    </div>
    <div id="drawer-content"></div>
  </div>
</div>

<!-- ── Toast ────────────────────────────────────────────────────────────── -->
<div id="toast"></div>

<!-- ── Script ───────────────────────────────────────────────────────────── -->
<script>
// ┌────────────────────────────────────────────────────────────────────────┐
// │  CONFIGURATION — set your API base URL here                            │
// └────────────────────────────────────────────────────────────────────────┘
const API_BASE = "https://YOUR-RAILWAY-APP.railway.app";
// Example: "https://madrid-tracker-api.railway.app"

// ── State ─────────────────────────────────────────────────────────────────
let currentPage   = 1;
let currentTab    = "all";
let activeView    = "list";
let leafletMap    = null;
let mapMarkers    = [];
let priceCharts   = {};

// ── Init ──────────────────────────────────────────────────────────────────
(async function init() {
  await loadStats();
  await loadProperties(1);
})();

// ── Stats ─────────────────────────────────────────────────────────────────
async function loadStats() {
  try {
    const data = await api("/stats");
    const k = data.kpis;
    setText("kpi-total",   fmt(k.active_total));
    setText("kpi-new",     fmt(k.new_48h));
    setText("kpi-unviewed",fmt(k.unviewed));
    setText("kpi-saved",   fmt(k.saved));
    setText("kpi-drops",   fmt(data.price_drops));
    setText("kpi-avg-sqm", k.avg_price_sqm ? "€" + Math.round(k.avg_price_sqm) : "—");

    // Populate district dropdown
    const sel = document.getElementById("f-district");
    data.by_district.forEach(d => {
      if (!d.district) return;
      const opt = document.createElement("option");
      opt.value = d.district;
      opt.textContent = `${d.district} (${d.count})`;
      sel.appendChild(opt);
    });

    // Last scan
    if (data.last_scan) {
      const dt = new Date(data.last_scan.scanned_at);
      document.getElementById("last-scan-label").textContent =
        `Last scan: ${timeAgo(dt)}  •  ${data.last_scan.new_properties} new  •  ${data.last_scan.price_changes} price changes`;
    }
  } catch (e) {
    console.error("Stats error:", e);
  }
}

// ── Properties ────────────────────────────────────────────────────────────
async function loadProperties(page = 1) {
  currentPage = page;
  showLoading(true);

  const params = buildParams(page);
  try {
    const data = await api("/properties?" + new URLSearchParams(params));
    renderCards(data.data);
    renderPagination(data.page, data.pages, data.total);
    if (activeView === "map") renderMap(data.data);
  } catch (e) {
    console.error("Properties error:", e);
    toast("Failed to load properties. Check API_BASE configuration.");
  } finally {
    showLoading(false);
  }
}

function buildParams(page) {
  const p = {
    page,
    page_size: 20,
    sort: document.getElementById("f-sort").value,
    order: "desc",
  };
  const district  = document.getElementById("f-district").value;
  const minPrice  = document.getElementById("f-min-price").value;
  const maxPrice  = document.getElementById("f-max-price").value;
  const rooms     = document.getElementById("f-rooms").value;

  if (district)  p.district  = district;
  if (minPrice)  p.min_price = minPrice;
  if (maxPrice)  p.max_price = maxPrice;
  if (rooms)     p.min_rooms = rooms;

  // Tab overrides
  if (currentTab === "new")    p.new_only = true;
  if (currentTab === "saved")  p.saved    = true;
  if (currentTab === "drop")   p.price_drop = true;
  if (currentTab === "unseen") p.viewed   = false;

  return p;
}

// ── Card Rendering ────────────────────────────────────────────────────────
function renderCards(props) {
  const grid = document.getElementById("property-grid");
  const noRes = document.getElementById("no-results");
  grid.innerHTML = "";

  if (!props || !props.length) {
    noRes.classList.remove("hidden");
    return;
  }
  noRes.classList.add("hidden");

  props.forEach(p => {
    const isNew   = isNewProperty(p.first_seen_at);
    const hasDrop = p.initial_price && p.price < p.initial_price;
    const dropPct = hasDrop
      ? Math.round((p.price - p.initial_price) / p.initial_price * 100)
      : null;

    const card = document.createElement("div");
    card.className = "card overflow-hidden cursor-pointer flex flex-col";
    card.onclick   = () => openDrawer(p.property_code);

    card.innerHTML = `
      <div class="relative">
        <img class="property-img"
          src="${p.thumbnail || ''}"
          onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22180%22><rect fill=%22%23e2e8f0%22 width=%22400%22 height=%22180%22/><text fill=%22%23a0aec0%22 font-size=%2248%22 x=%22180%22 y=%2295%22>🏠</text></svg>'"
          alt="${p.address || ''}"
          loading="lazy"
        />
        <div class="absolute top-2 left-2 flex flex-wrap gap-1">
          ${isNew   ? '<span class="badge badge-new">NEW</span>' : ''}
          ${hasDrop ? `<span class="badge badge-drop">▼ ${Math.abs(dropPct)}%</span>` : ''}
          ${p.saved ? '<span class="badge badge-saved">★ Saved</span>' : ''}
          ${p.viewed? '<span class="badge badge-viewed">✓ Seen</span>' : ''}
        </div>
        ${p.num_photos ? `<div class="absolute bottom-2 right-2 bg-black/50 text-white text-xs px-2 py-0.5 rounded-full">📷 ${p.num_photos}</div>` : ''}
      </div>

      <div class="p-3 flex flex-col flex-1 gap-1">
        <div class="flex items-start justify-between gap-1">
          <div class="font-bold text-lg text-gray-900">
            ${fmtPrice(p.price)}
          </div>
          ${hasDrop ? `<div class="text-xs line-through text-gray-400">${fmtPrice(p.initial_price)}</div>` : ''}
        </div>
        <div class="text-xs text-gray-500">
          ${p.price_per_sqm ? `€${Math.round(p.price_per_sqm)}/m²` : ''}
        </div>

        <div class="flex gap-3 text-sm text-gray-700 mt-1">
          ${p.rooms    ? `<span>🛏 ${p.rooms}</span>` : ''}
          ${p.bathrooms? `<span>🚿 ${p.bathrooms}</span>` : ''}
          ${p.size     ? `<span>📐 ${p.size}m²</span>` : ''}
        </div>

        <div class="text-sm text-gray-800 mt-1 font-medium truncate">
          ${p.address || ''}
        </div>
        <div class="text-xs text-gray-400">
          ${[p.district, p.municipality].filter(Boolean).join(' · ')}
        </div>

        <div class="mt-auto pt-2 flex gap-2">
          <button onclick="event.stopPropagation(); toggleSaved('${p.property_code}', this)"
            class="text-xs px-3 py-1 rounded-full border border-gray-200 hover:border-blue-400 hover:text-blue-600 transition-colors ${p.saved ? 'bg-blue-50 border-blue-400 text-blue-600' : ''}">
            ${p.saved ? '★ Saved' : '☆ Save'}
          </button>
          <a href="${p.url || '#'}" target="_blank" rel="noopener"
            onclick="event.stopPropagation(); markViewed('${p.property_code}')"
            class="text-xs px-3 py-1 rounded-full border border-gray-200 hover:border-green-500 hover:text-green-600 transition-colors">
            Open →
          </a>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

// ── Map ───────────────────────────────────────────────────────────────────
function renderMap(props) {
  if (!leafletMap) {
    leafletMap = L.map("map").setView([40.4168, -3.7038], 12);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© OpenStreetMap contributors",
    }).addTo(leafletMap);
  }
  mapMarkers.forEach(m => m.remove());
  mapMarkers = [];

  props.forEach(p => {
    if (!p.latitude || !p.longitude) return;
    const hasDrop = p.initial_price && p.price < p.initial_price;
    const color   = hasDrop ? "#dc2626" : p.saved ? "#2563eb" : "#16a34a";

    const icon = L.divIcon({
      className: "",
      html: `<div style="
        background:${color}; color:white; border-radius:99px;
        padding:3px 7px; font-size:11px; font-weight:700;
        box-shadow:0 2px 6px rgba(0,0,0,.25); white-space:nowrap;
      ">${fmtPrice(p.price, true)}</div>`,
      iconAnchor: [0, 0],
    });

    const marker = L.marker([p.latitude, p.longitude], { icon })
      .addTo(leafletMap)
      .bindPopup(`
        <div style="min-width:200px">
          <b>${fmtPrice(p.price)}</b><br/>
          ${p.rooms || '?'} bed · ${p.size || '?'}m²<br/>
          <small>${p.address || ''}</small><br/>
          <small style="color:#6b7280">${p.district || ''}</small><br/>
          <a href="${p.url}" target="_blank" style="color:#2563eb;font-size:.8rem">View on Idealista →</a>
        </div>
      `);
    mapMarkers.push(marker);
  });
}

// ── Drawer ─────────────────────────────────────────────────────────────────
async function openDrawer(code) {
  document.getElementById("drawer-title").textContent = "Loading…";
  document.getElementById("drawer-content").innerHTML =
    '<div class="flex justify-center py-8"><div class="spinner"></div></div>';
  document.getElementById("drawer-overlay").style.display = "block";
  document.getElementById("drawer").classList.add("open");

  try {
    const data = await api(`/properties/${code}`);
    const p    = data.property;
    const hist = data.price_history;

    document.getElementById("drawer-title").textContent =
      `${p.address || p.district} – ${fmtPrice(p.price)}`;

    const hasDrop  = hist.length > 1 && hist[hist.length-1].price < hist[0].price;
    const dropPct  = hasDrop
      ? Math.round((hist[hist.length-1].price - hist[0].price) / hist[0].price * 100)
      : 0;

    document.getElementById("drawer-content").innerHTML = `
      <img src="${p.thumbnail || ''}" class="w-full rounded-lg mb-4" style="max-height:220px;object-fit:cover"
        onerror="this.remove()" />

      <div class="flex gap-2 flex-wrap mb-4">
        ${isNewProperty(p.first_seen_at) ? '<span class="badge badge-new">NEW</span>' : ''}
        ${hasDrop ? `<span class="badge badge-drop">Price drop ${dropPct}%</span>` : ''}
        ${p.saved  ? '<span class="badge badge-saved">★ Saved</span>' : ''}
        ${p.viewed ? '<span class="badge badge-viewed">✓ Viewed</span>' : ''}
      </div>

      <!-- Price + key stats -->
      <div class="grid grid-cols-2 gap-3 mb-4">
        <div class="bg-blue-50 rounded-xl p-3 text-center">
          <div class="text-2xl font-bold text-blue-700">${fmtPrice(p.price)}</div>
          <div class="text-xs text-blue-500">${p.price_per_sqm ? `€${Math.round(p.price_per_sqm)}/m²` : ''}</div>
        </div>
        <div class="grid grid-cols-3 gap-2">
          <div class="bg-gray-50 rounded-lg p-2 text-center">
            <div class="font-bold">${p.rooms || '—'}</div>
            <div class="text-xs text-gray-500">Rooms</div>
          </div>
          <div class="bg-gray-50 rounded-lg p-2 text-center">
            <div class="font-bold">${p.bathrooms || '—'}</div>
            <div class="text-xs text-gray-500">Baths</div>
          </div>
          <div class="bg-gray-50 rounded-lg p-2 text-center">
            <div class="font-bold">${p.size ? p.size+'m²' : '—'}</div>
            <div class="text-xs text-gray-500">Size</div>
          </div>
        </div>
      </div>

      <!-- Location -->
      <div class="mb-4 text-sm">
        <div class="font-semibold text-gray-800">${p.address || ''}</div>
        <div class="text-gray-500">${[p.district, p.municipality, p.province].filter(Boolean).join(' · ')}</div>
        ${p.floor ? `<div class="text-gray-500">Floor ${p.floor}</div>` : ''}
      </div>

      <!-- Features -->
      <div class="flex flex-wrap gap-2 mb-4">
        ${p.has_air_conditioning ? '<span class="bg-sky-50 text-sky-700 text-xs px-2 py-1 rounded-full">❄️ A/C</span>' : ''}
        ${p.has_swimming_pool    ? '<span class="bg-cyan-50 text-cyan-700 text-xs px-2 py-1 rounded-full">🏊 Pool</span>' : ''}
        ${p.has_garden          ? '<span class="bg-green-50 text-green-700 text-xs px-2 py-1 rounded-full">🌿 Garden</span>' : ''}
        ${p.has_box_room        ? '<span class="bg-gray-50 text-gray-700 text-xs px-2 py-1 rounded-full">📦 Storage</span>' : ''}
        ${p.has_video           ? '<span class="bg-purple-50 text-purple-700 text-xs px-2 py-1 rounded-full">🎬 Video</span>' : ''}
        ${p.status              ? `<span class="bg-yellow-50 text-yellow-700 text-xs px-2 py-1 rounded-full">${p.status}</span>` : ''}
      </div>

      <!-- Price history chart -->
      ${hist.length > 1 ? `
      <div class="mb-4">
        <div class="text-xs font-semibold text-gray-500 mb-2 uppercase tracking-wide">Price History</div>
        <canvas id="price-chart-${code}" height="90"></canvas>
      </div>` : ''}

      <!-- Description -->
      ${p.description ? `
      <div class="mb-4">
        <div class="text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wide">Description</div>
        <p class="text-sm text-gray-700 leading-relaxed">${p.description.slice(0, 400)}${p.description.length>400?'…':''}</p>
      </div>` : ''}

      <!-- Agency -->
      ${p.agency_name ? `<div class="text-xs text-gray-400 mb-4">Agency: ${p.agency_name}</div>` : ''}

      <!-- First/last seen -->
      <div class="text-xs text-gray-400 mb-4">
        First seen: ${fmtDate(p.first_seen_at)}
        ${p.last_seen_at !== p.first_seen_at ? ` · Last seen: ${fmtDate(p.last_seen_at)}` : ''}
      </div>

      <!-- Notes -->
      <div class="mb-4">
        <div class="text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wide">My Notes</div>
        <textarea id="notes-${code}" rows="3" placeholder="Add personal notes here…"
          class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
        >${p.notes || ''}</textarea>
        <button onclick="saveNotes('${code}')"
          class="mt-1 text-xs bg-blue-600 text-white px-4 py-1.5 rounded-lg hover:bg-blue-700">
          Save notes
        </button>
      </div>

      <!-- Actions -->
      <div class="flex gap-3 flex-wrap">
        <button onclick="toggleSavedDrawer('${code}', ${p.saved})"
          id="saved-btn-${code}"
          class="flex-1 py-2 rounded-xl border-2 border-blue-200 text-blue-700 font-semibold text-sm hover:bg-blue-50 transition">
          ${p.saved ? '★ Saved' : '☆ Save'}
        </button>
        <a href="${p.url}" target="_blank" rel="noopener"
          onclick="markViewed('${code}')"
          class="flex-1 py-2 rounded-xl bg-blue-600 text-white font-semibold text-sm text-center hover:bg-blue-700 transition">
          View on Idealista →
        </a>
      </div>
    `;

    // Render price chart
    if (hist.length > 1) {
      const ctx = document.getElementById(`price-chart-${code}`).getContext("2d");
      if (priceCharts[code]) priceCharts[code].destroy();
      priceCharts[code] = new Chart(ctx, {
        type: "line",
        data: {
          labels: hist.map(h => fmtDate(h.recorded_at)),
          datasets: [{
            data: hist.map(h => h.price),
            borderColor: hasDrop ? "#dc2626" : "#2563eb",
            backgroundColor: hasDrop ? "rgba(220,38,38,.08)" : "rgba(37,99,235,.08)",
            borderWidth: 2,
            pointRadius: 4,
            tension: 0.3,
            fill: true,
          }],
        },
        options: {
          plugins: { legend: { display: false } },
          scales: {
            y: {
              ticks: {
                callback: v => "€" + v.toLocaleString(),
                font: { size: 10 },
              },
            },
            x: { ticks: { font: { size: 9 } } },
          },
        },
      });
    }

    // Mark as viewed
    markViewed(code);

  } catch (e) {
    console.error("Drawer error:", e);
    document.getElementById("drawer-content").innerHTML =
      '<div class="text-red-500 text-sm">Failed to load property details.</div>';
  }
}

function closeDrawer() {
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("drawer-overlay").style.display = "none";
}

// ── Actions ───────────────────────────────────────────────────────────────
async function toggleSaved(code, btn) {
  try {
    const res = await api(`/properties/${code}/saved`, "PATCH");
    btn.textContent = res.saved ? "★ Saved" : "☆ Save";
    btn.className   = res.saved
      ? "text-xs px-3 py-1 rounded-full border border-blue-400 text-blue-600 bg-blue-50 transition-colors"
      : "text-xs px-3 py-1 rounded-full border border-gray-200 hover:border-blue-400 hover:text-blue-600 transition-colors";
    toast(res.saved ? "Saved ★" : "Unsaved");
  } catch (e) { toast("Error saving property"); }
}

async function toggleSavedDrawer(code, wasSaved) {
  try {
    const res = await api(`/properties/${code}/saved`, "PATCH");
    const btn = document.getElementById(`saved-btn-${code}`);
    if (btn) btn.textContent = res.saved ? "★ Saved" : "☆ Save";
    toast(res.saved ? "Saved ★" : "Unsaved");
  } catch (e) { toast("Error"); }
}

async function markViewed(code) {
  try { await api(`/properties/${code}/viewed`, "PATCH"); }
  catch (_) {}
}

async function saveNotes(code) {
  const notes = document.getElementById(`notes-${code}`).value;
  try {
    await api(`/properties/${code}/notes`, "PATCH", { notes });
    toast("Notes saved");
  } catch (e) { toast("Error saving notes"); }
}

async function triggerScan() {
  try {
    await api("/scan/trigger", "POST");
    toast("Scan started — check back in a few minutes");
  } catch (e) { toast("Could not trigger scan"); }
}

// ── Tabs ──────────────────────────────────────────────────────────────────
function setTab(tab) {
  currentTab = tab;
  ["all","new","saved","drop","unseen"].forEach(t => {
    const btn = document.getElementById(`tab-${t}`);
    btn.className = `pill-btn ${t === tab ? "active" : "inactive"}`;
  });
  loadProperties(1);
}

// ── View toggle ───────────────────────────────────────────────────────────
function toggleView(view) {
  activeView = view;
  document.getElementById("view-map").classList.toggle("hidden",  view !== "map");
  document.getElementById("view-list").classList.toggle("hidden", view === "map");
  document.getElementById("btn-map").className  = `pill-btn ${view === "map"  ? "active" : "inactive"}`;
  document.getElementById("btn-list").className = `pill-btn ${view === "list" ? "active" : "inactive"}`;
  if (view === "map") loadProperties(currentPage);
}

// ── Pagination ─────────────────────────────────────────────────────────────
function renderPagination(page, pages, total) {
  const container = document.getElementById("pagination");
  container.innerHTML = "";
  if (pages <= 1) return;

  const addBtn = (label, targetPage, isCurrent = false, disabled = false) => {
    const btn = document.createElement("button");
    btn.className = `page-btn ${isCurrent ? "current" : ""} ${disabled ? "opacity-40" : ""}`;
    btn.textContent = label;
    btn.disabled = disabled;
    if (!disabled && !isCurrent) btn.onclick = () => loadProperties(targetPage);
    container.appendChild(btn);
  };

  addBtn("‹ Prev", page - 1, false, page === 1);

  const start = Math.max(1, page - 2);
  const end   = Math.min(pages, page + 2);
  for (let i = start; i <= end; i++) addBtn(i, i, i === page);

  addBtn("Next ›", page + 1, false, page === pages);

  const info = document.createElement("span");
  info.className = "text-xs text-gray-400 ml-2";
  info.textContent = `${total} properties`;
  container.appendChild(info);
}

// ── Filters ───────────────────────────────────────────────────────────────
function resetFilters() {
  document.getElementById("f-district").value  = "";
  document.getElementById("f-min-price").value = "";
  document.getElementById("f-max-price").value = "";
  document.getElementById("f-rooms").value     = "";
  document.getElementById("f-sort").value      = "first_seen_at";
  currentTab = "all";
  ["all","new","saved","drop","unseen"].forEach(t => {
    document.getElementById(`tab-${t}`).className = `pill-btn ${t==="all"?"active":"inactive"}`;
  });
  loadProperties(1);
}

// ── Utilities ─────────────────────────────────────────────────────────────
async function api(path, method = "GET", body = null) {
  const opts = { method, headers: { "Content-Type": "application/json" } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API_BASE + path, opts);
  if (!res.ok) throw new Error(`API ${res.status}`);
  return res.json();
}

function setText(id, val) {
  const el = document.getElementById(id);
  if (el) el.textContent = val;
}

function fmt(n) {
  if (n == null) return "—";
  return Number(n).toLocaleString();
}

function fmtPrice(n, compact = false) {
  if (n == null) return "—";
  if (compact) return "€" + (n >= 1000 ? Math.round(n/1000) + "k" : n);
  return "€" + Number(n).toLocaleString();
}

function fmtDate(d) {
  if (!d) return "";
  return new Date(d).toLocaleDateString("en-GB", { day:"numeric", month:"short", year:"numeric" });
}

function timeAgo(date) {
  const secs = (Date.now() - date) / 1000;
  if (secs < 60)   return "just now";
  if (secs < 3600) return Math.round(secs/60) + "m ago";
  if (secs < 86400)return Math.round(secs/3600) + "h ago";
  return Math.round(secs/86400) + "d ago";
}

function isNewProperty(dateStr) {
  if (!dateStr) return false;
  return (Date.now() - new Date(dateStr)) < 48 * 3600 * 1000;
}

function showLoading(show) {
  document.getElementById("loading").classList.toggle("hidden", !show);
  document.getElementById("property-grid").classList.toggle("hidden", show);
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2500);
}
</script>
